<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-REAPER | ABSOLUTE</title>
    <style>
        :root { --p: #007aff; --b: #ff3b30; --neon: #00fff2; --gold: #ffcc00; --bg: #000; --card: #080808; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 10px; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        .reaper-shell { max-width: 400px; margin: auto; border: 1px solid #1a1a1a; border-radius: 35px; padding: 20px; background: var(--card); box-shadow: 0 0 100px rgba(0,255,242,0.1); }
        
        .display-unit { text-align: center; padding: 20px 0; border-bottom: 1px solid #111; position: relative; }
        .target-signal { font-size: 80px; font-weight: 900; height: 100px; display: flex; align-items: center; justify-content: center; letter-spacing: -4px; transition: 0.2s; }
        .prob-bar { width: 100%; height: 4px; background: #111; margin: 15px 0; border-radius: 2px; overflow: hidden; }
        #fill { height: 100%; width: 0%; background: var(--neon); transition: 0.8s; box-shadow: 0 0 15px var(--neon); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn-master { border: none; height: 90px; border-radius: 25px; font-size: 35px; font-weight: 900; color: #fff; cursor: pointer; position: relative; transition: 0.1s; border-bottom: 6px solid rgba(0,0,0,0.5); }
        .btn-p { background: linear-gradient(180deg, var(--p), #003a7a); }
        .btn-b { background: linear-gradient(180deg, var(--b), #8a0e09); }
        .btn-master:active { transform: translateY(3px); border-bottom-width: 2px; }

        .history-flow { display: flex; gap: 6px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; border-bottom: 1px solid #111; }
        .node { min-width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; border: 1px solid #222; }
        
        .meta-data { display: flex; justify-content: space-between; font-size: 11px; margin-top: 15px; font-weight: bold; color: #444; }
        .status-chip { font-size: 9px; padding: 3px 10px; border-radius: 10px; background: #000; border: 1px solid #222; color: var(--neon); letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="reaper-shell">
    <div style="text-align:center; font-size:8px; color:#333; letter-spacing:8px;">EXISTENCE : OMNI-REAPER</div>

    <div class="display-unit">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span id="sys-mode" class="status-chip">CALIBRATING SYSTEM</span>
            <span id="entropy-lvl" style="font-size:10px; color:var(--gold);">ENTROPY: 0.0</span>
        </div>
        <div id="target" class="target-signal" style="color:#111;">SCAN</div>
        <div class="prob-bar"><div id="fill"></div></div>
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div><span id="prob-val" style="font-size:40px; font-weight:900; color:var(--neon);">0%</span></div>
            <div style="text-align:right; font-size:10px; color:#555;"><div id="conf-lvl">SCANNING DATA...</div><div id="nodes-count" style="color:var(--gold)">NODES: 0</div></div>
        </div>
    </div>

    <div class="btn-grid">
        <button class="btn-master btn-p" onclick="cmd('P')">P</button>
        <button class="btn-master btn-b" onclick="cmd('B')">B</button>
    </div>

    <div class="history-flow" id="h-box"></div>

    <div class="meta-data">
        <span id="w-ui">W: 0</span>
        <span id="l-ui">L: 0</span>
        <span id="net-ui" style="color:var(--gold)">NET: 0</span>
    </div>

    <div style="display:flex; justify-content:space-between; margin-top:20px; font-size:10px;">
        <span onclick="undo()" style="color:#333; cursor:pointer;">[ UNDO ]</span>
        <span onclick="location.reload()" style="color:var(--b); cursor:pointer;">[ HARD PURGE ]</span>
    </div>
</div>

<script>
let archive = [];
let netLog = [0];
let wins = 0, loses = 0, lStreak = 0;
let nextMove = null;

function cmd(s) {
    if(nextMove) {
        if(nextMove === s) { wins++; updateNet(1); lStreak = 0; }
        else { loses++; updateNet(-1); lStreak++; }
    }
    archive.push(s);
    renderUI();
    omniEngine();
}

function updateNet(v) { netLog.push(netLog[netLog.length-1] + v); }

function omniEngine() {
    const len = archive.length;
    if(len < 6) return;

    let pW = 0, bW = 0, nodes = 0;
    
    // --- OMNI-REAPER THRESHOLD (จุดมองขาดขั้นสุด) ---
    let limit = 75; 
    if(lStreak === 1) limit = 85; 
    if(lStreak >= 2) limit = 95; // โหมดแก้เกม: ต้องมั่นใจ 95% เท่านั้น

    // --- NEURAL CLUSTER SCAN (60 LAYERS) ---
    for(let d = 2; d <= 60; d++) {
        if(len < d) break;
        const pat = archive.slice(-d).join("");
        const score = Math.pow(d, 7); // Exponential Layering

        for(let i = 0; i < len - d; i++) {
            if(archive.slice(i, i + d).join("") === pat) {
                const recency = Math.exp((i - len) / 12); // Weight เฉพาะข้อมูลล่าสุด
                if(archive[i + d] === 'P') pW += (score * recency);
                else bW += (score * recency);
                nodes++;
            }
        }
    }

    // --- DECEPTION CHECK (Entropy Analysis) ---
    const last12 = archive.slice(-12);
    const entropy = Math.abs(6 - last12.filter(x => x === 'P').length) / 6;

    const total = pW + bW;
    const probP = (pW / total) * 100;
    const probB = (bW / total) * 100;
    const maxP = Math.max(probP, probB);

    const target = document.getElementById('target');
    const bar = document.getElementById('fill');
    const mode = document.getElementById('sys-mode');

    // --- THE ABSOLUTE GATE ---
    if(maxP > limit && entropy > 0.05) {
        const side = probP > probB ? "PLAYER" : "BANKER";
        nextMove = side === "PLAYER" ? "P" : "B";
        
        target.innerText = side;
        target.style.color = side === "PLAYER" ? "var(--p)" : "var(--b)";
        document.getElementById('prob-val').innerText = maxP.toFixed(1) + "%";
        bar.style.width = maxP + "%";
        bar.style.background = side === "PLAYER" ? "var(--p)" : "var(--b)";
        
        mode.innerText = lStreak > 0 ? "ABS RECOVERY" : "EXISTENCE DETECTED";
        mode.style.color = lStreak > 0 ? "var(--b)" : "var(--neon)";
        document.getElementById('conf-lvl').innerText = maxP > 93 ? "CRITICAL KILL" : "HIGH PRECISION";
        document.getElementById('entropy-lvl').innerText = `ENTROPY: ${entropy.toFixed(2)}`;
    } else {
        nextMove = null;
        target.innerText = "STAY";
        target.style.color = "#111";
        document.getElementById('prob-val').innerText = "---";
        bar.style.width = "0%";
        mode.innerText = "SCANNING VOID";
        mode.style.color = "#444";
        document.getElementById('conf-lvl').innerText = "UNCERTAIN PHASE";
        document.getElementById('entropy-lvl').innerText = `ENTROPY: ${entropy.toFixed(2)}`;
    }
    document.getElementById('nodes-count').innerText = `NODES: ${nodes}`;
}

function renderUI() {
    const box = document.getElementById('h-box');
    box.innerHTML = archive.map(s => `<div class="node" style="background:${s==='P'?'var(--p)':'var(--b)'}">${s}</div>`).join("");
    box.scrollLeft = box.scrollWidth;
    document.getElementById('w-ui').innerText = `W: ${wins}`;
    document.getElementById('l-ui').innerText = `L: ${loses}`;
    document.getElementById('net-ui').innerText = `NET: ${netLog[netLog.length-1]}`;
}

function undo() {
    if(archive.length > 0) {
        archive.pop();
        if(netLog.length > 1) netLog.pop();
        if(lStreak > 0) lStreak--;
        renderUI(); omniEngine();
    }
}
window.onload = renderUI;
</script>
</body>
</html>
