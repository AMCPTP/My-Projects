<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL | OMNIPOTENT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #007aff; --b: #ff3b30; --gold: #ffcc00; --bg: #000; --card: #080808; --neon: #00ff41; --danger: #ff0055; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 10px; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 420px; margin: auto; }
        
        .master-panel { background: var(--card); border-radius: 40px; padding: 25px; border: 1px solid #151515; margin-bottom: 12px; position: relative; box-shadow: 0 0 60px rgba(0,255,65,0.03); }
        .master-panel::after { content: ""; position: absolute; inset: 0; border-radius: 40px; padding: 1px; background: linear-gradient(180deg, #333, transparent); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; }

        .signal-text { font-size: 85px; font-weight: 900; margin: 10px 0; height: 100px; display: flex; align-items: center; justify-content: center; letter-spacing: -6px; transition: 0.3s; }
        
        .btn-box { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { border: none; height: 95px; border-radius: 28px; font-size: 32px; font-weight: 900; cursor: pointer; color: #fff; transition: 0.1s; position: relative; z-index: 2; }
        .btn-p { background: linear-gradient(180deg, var(--p), #003a7a); box-shadow: 0 8px 0 #00254d; }
        .btn-b { background: linear-gradient(180deg, var(--b), #8a0e09); box-shadow: 0 8px 0 #5c0906; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }

        .h-ribbon { display: flex; gap: 5px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; border-bottom: 1px solid #111; }
        .u { min-width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; border: 1px solid #222; }
        
        .meter-wrap { width: 100%; height: 6px; background: #111; border-radius: 3px; margin: 20px 0; overflow: hidden; }
        #fill { height: 100%; width: 0%; background: var(--neon); transition: 0.8s cubic-bezier(0.1, 0.9, 0.1, 1); box-shadow: 0 0 20px var(--neon); }

        .info-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .acc-text { font-size: 48px; font-weight: 900; color: var(--neon); line-height: 0.8; }
        .status-pill { font-size: 10px; padding: 4px 12px; border-radius: 20px; background: #111; border: 1px solid #222; font-weight: 900; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; font-size:9px; color:#555; letter-spacing:10px; font-weight:900; margin: 15px 0;">SENTINEL : THE OMNIPOTENT OVERSEER</div>

    <div class="master-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span id="sys-mode" class="status-pill" style="color:var(--neon)">SENTINEL ONLINE</span>
            <span id="match-data" style="font-size:9px; color:#444; font-weight:bold;">ARCHIVE SCANNING...</span>
        </div>

        <div id="target" class="signal-text" style="color:#151515;">INIT</div>
        
        <div class="meter-wrap"><div id="fill"></div></div>

        <div class="info-row">
            <div>
                <div id="acc-val" class="acc-text">0%</div>
                <div style="font-size:10px; color:#333; font-weight:900; margin-top:5px;">OMNISCIENT PRECISION</div>
            </div>
            <div style="text-align:right;">
                <div id="trend-ui" style="font-size:12px; font-weight:900; color:#555;">NORMAL</div>
                <div id="chaos-ui" style="font-size:9px; color:var(--danger); font-weight:bold;">CHAOS: 0.00</div>
            </div>
        </div>
    </div>

    <div class="master-panel" style="padding: 20px;">
        <div class="btn-box">
            <button class="btn btn-p" onclick="feed('P')">P</button>
            <button class="btn btn-b" onclick="feed('B')">B</button>
        </div>
        <div class="h-ribbon" id="h-view"></div>
        <div style="display:flex; justify-content:space-between; font-size:13px; font-weight:900; margin-top:20px; color:#333;">
            <span id="win-ui">W: 0</span>
            <span id="loss-ui">L: 0</span>
            <span id="profit-ui" style="color:var(--gold)">NET: 0</span>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:11px; color:#222; margin-top:20px;">
            <span onclick="undo()" style="cursor:pointer; padding:5px;">[ UNDO ]</span>
            <span onclick="location.reload()" style="cursor:pointer; color:var(--danger); padding:5px;">[ RESET SYSTEM ]</span>
        </div>
    </div>

    <div class="master-panel" style="padding:10px;">
        <canvas id="sentinelChart" height="140"></canvas>
    </div>
</div>

<script>
let archive = [];
let profitLog = [0];
let w = 0, l = 0;
let lastMove = null;
let chart;
let recoveryScale = 1.0;

function feed(side) {
    if(lastMove) {
        if(lastMove === side) { w++; updateStats(1); recoveryScale = 1.0; }
        else { l++; updateStats(-1); recoveryScale += 0.75; }
    }
    archive.push(side);
    renderHUD();
    sentinelEngine();
}

function updateStats(v) { profitLog.push(profitLog[profitLog.length-1] + v); }

function sentinelEngine() {
    if(archive.length < 5) return;

    let pWeight = 0, bWeight = 0;
    let matchPoints = 0;
    const len = archive.length;

    // --- DRAGON PROTECTION LOGIC ---
    const last6 = archive.slice(-6).join("");
    let isDragon = (last6 === "PPPPPP" || last6 === "BBBBBB");

    // --- 30-LAYER OMNIPOTENT SCAN ---
    for(let d = 2; d <= 30; d++) {
        if(len < d) break;
        const pattern = archive.slice(-d).join("");
        let power = Math.pow(d, 5.5) * recoveryScale;

        for(let i = 0; i < len - d; i++) {
            if(archive.slice(i, i + d).join("") === pattern) {
                const res = archive[i + d];
                const recency = (i / len);
                if(res === 'P') pWeight += (power * recency);
                else if(res === 'B') bWeight += (power * recency);
                matchPoints++;
            }
        }
    }

    // --- TREND-FOLLOWING OVERRIDE (Chaos Shield) ---
    if(isDragon) {
        const streakSide = archive[len-1];
        if(streakSide === 'P') pWeight *= 2.5; else bWeight *= 2.5;
    }

    const total = pWeight + bWeight;
    const probP = (pWeight / total) * 100;
    const probB = (bWeight / total) * 100;

    const targetEl = document.getElementById('target');
    const fill = document.getElementById('fill');
    const accEl = document.getElementById('acc-val');
    const modeEl = document.getElementById('sys-mode');

    // EXTREME PRECISION THRESHOLD: 70%
    if(probP > 70 || probB > 70) {
        const side = probP > probB ? "PLAYER" : "BANKER";
        const val = Math.max(probP, probB);
        
        lastMove = side === "PLAYER" ? "P" : "B";
        targetEl.innerText = side;
        targetEl.style.color = side === "PLAYER" ? "var(--p)" : "var(--b)";
        accEl.innerText = val.toFixed(1) + "%";
        fill.style.width = val + "%";
        fill.style.background = side === "PLAYER" ? "var(--p)" : "var(--b)";
        
        modeEl.innerText = recoveryScale > 1 ? "RECOVERY OVERDRIVE" : (isDragon ? "DRAGON FOLLOWING" : "SENTINEL ACTIVE");
        modeEl.style.color = recoveryScale > 1 ? "var(--gold)" : "var(--neon)";
        document.getElementById('match-data').innerText = `${matchPoints} SINGULARITIES FOUND`;
        document.getElementById('trend-ui').innerText = isDragon ? "STREAK" : "STABLE";
        document.getElementById('chaos-ui').innerText = `CHAOS: 0.12`;
    } else {
        lastMove = null;
        targetEl.innerText = "WAIT";
        targetEl.style.color = "#151515";
        accEl.innerText = "---";
        fill.style.width = "0%";
        modeEl.innerText = "SCANNING VOID...";
        modeEl.style.color = "#444";
        document.getElementById('match-data').innerText = "LOW CERTAINTY";
        document.getElementById('chaos-ui').innerText = `CHAOS: 0.98`;
    }
}

function renderHUD() {
    const box = document.getElementById('h-view');
    box.innerHTML = archive.map(s => `<div class="u" style="background:${s==='P'?'var(--p)':'var(--b)'}">${s}</div>`).join("");
    box.scrollLeft = box.scrollWidth;
    
    document.getElementById('win-ui').innerText = `W: ${w}`;
    document.getElementById('loss-ui').innerText = `L: ${l}`;
    document.getElementById('profit-ui').innerText = `NET: ${profitLog[profitLog.length-1]}`;
    
    if(!chart) {
        const ctx = document.getElementById('sentinelChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [0], datasets: [{ data: [0], borderColor: '#00ff41', borderWidth: 4, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: 'rgba(0,255,65,0.02)' }] },
            options: { plugins:{legend:{display:false}}, scales:{x:{display:false}, y:{grid:{color:'#111'}, ticks:{color:'#333'}}} }
        });
    }
    chart.data.labels = profitLog.map((_, i) => i);
    chart.data.datasets[0].data = profitLog;
    chart.update('none');
}

function undo() {
    if(archive.length > 0) {
        archive.pop();
        if(profitLog.length > 1) profitLog.pop();
        renderHUD();
        sentinelEngine();
    }
}

window.onload = renderHUD;
</script>
</body>
</html>
