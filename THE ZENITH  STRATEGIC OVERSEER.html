<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ZENITH | STRATEGIC OVERSEER</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #007aff; --b: #ff3b30; --gold: #ffcc00; --bg: #000; --card: #0d0d0d; --neon: #00fff2; --danger: #ff2d55; --safe: #34c759; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; user-select: none; }
        .container { max-width: 420px; margin: auto; }
        
        /* Tactical Display */
        .tactical-panel { background: var(--card); border-radius: 35px; padding: 25px; border: 1px solid #1a1a1a; margin-bottom: 12px; position: relative; box-shadow: 0 0 40px rgba(0,255,242,0.1); }
        .tactical-panel::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, var(--neon), transparent); }

        .signal-main { font-size: 80px; font-weight: 900; margin: 10px 0; height: 100px; display: flex; align-items: center; justify-content: center; letter-spacing: -4px; transition: 0.3s; text-shadow: 0 0 25px rgba(255,255,255,0.1); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { border: none; height: 85px; border-radius: 25px; font-size: 28px; font-weight: 900; cursor: pointer; color: #fff; transition: 0.1s; position: relative; border-bottom: 6px solid rgba(0,0,0,0.4); }
        .btn-p { background: linear-gradient(180deg, var(--p), #00458f); }
        .btn-b { background: linear-gradient(180deg, var(--b), #a8130c); }
        .btn:active { transform: translateY(4px); border-bottom-width: 2px; }

        .history-ribbon { display: flex; gap: 5px; overflow-x: auto; padding: 15px 0; border-bottom: 1px solid #1a1a1a; scrollbar-width: none; }
        .unit { min-width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; border: 1px solid #222; }
        
        .gauge-bar { width: 100%; height: 6px; background: #111; border-radius: 3px; margin: 20px 0; overflow: hidden; position: relative; }
        #gauge-fill { height: 100%; width: 0%; background: var(--neon); transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 0 15px var(--neon); }

        .stats-footer { display: flex; justify-content: space-between; align-items: flex-end; }
        .prob-large { font-size: 44px; font-weight: 900; color: var(--neon); line-height: 0.8; }
        .tag { font-size: 10px; padding: 4px 10px; border-radius: 15px; background: #1a1a1a; font-weight: 900; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; font-size:10px; color:var(--neon); letter-spacing:8px; font-weight:900; margin: 15px 0;">ZENITH : STRATEGIC OVERSEER</div>

    <div class="tactical-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span id="strategy-mode" class="tag" style="color:var(--safe)">WAITING FOR ANALYSIS</span>
            <span id="risk-score" style="font-size:10px; color:var(--danger); font-weight:bold;">RISK: 0.00</span>
        </div>

        <div id="target" class="signal-main" style="color:#1a1a1a;">INIT</div>
        
        <div class="gauge-bar"><div id="gauge-fill"></div></div>

        <div class="stats-footer">
            <div>
                <div id="prob-val" class="prob-large">0%</div>
                <div style="font-size:9px; color:#444; font-weight:900; margin-top:5px;">PRECISION INDEX</div>
            </div>
            <div style="text-align:right;">
                <div id="entry-point" style="font-size:12px; font-weight:900; color:#555;">SCANNING ARCHIVE...</div>
                <div id="match-pts" style="font-size:9px; color:var(--gold); font-weight:bold;">0 MATCHES</div>
            </div>
        </div>
    </div>

    <div class="tactical-panel" style="padding: 20px;">
        <div class="btn-grid">
            <button class="btn btn-p" onclick="process('P')">PLAYER</button>
            <button class="btn btn-b" onclick="process('B')">BANKER</button>
        </div>
        <div class="history-ribbon" id="h-view"></div>
        <div style="display:flex; justify-content:space-between; font-size:13px; font-weight:900; margin-top:15px; color:#444;">
            <span id="w-stat">W: 0</span>
            <span id="l-stat">L: 0</span>
            <span id="p-stat" style="color:var(--gold)">NET: 0</span>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:11px; color:#222; margin-top:20px;">
            <span onclick="undo()" style="cursor:pointer; padding:5px;">[ UNDO ]</span>
            <span onclick="location.reload()" style="cursor:pointer; color:var(--danger); padding:5px;">[ RESET SYSTEM ]</span>
        </div>
    </div>

    <div class="tactical-panel" style="padding:10px;">
        <canvas id="zenithChart" height="150"></canvas>
    </div>
</div>

<script>
let archive = [];
let profitLog = [0];
let wins = 0, loses = 0, consecutiveL = 0;
let lastSignal = null;
let chart;

function process(side) {
    if(lastSignal) {
        if(lastSignal === side) { 
            wins++; 
            logNet(1); 
            consecutiveL = 0;
        } else { 
            loses++; 
            logNet(-1); 
            consecutiveL++;
        }
    }
    archive.push(side);
    renderUI();
    zenithEngine();
}

function logNet(v) { profitLog.push(profitLog[profitLog.length-1] + v); }

function zenithEngine() {
    if(archive.length < 5) return;

    let pWeight = 0, bWeight = 0;
    let matches = 0;
    const len = archive.length;

    // --- STRATEGIC THRESHOLD ADJUSTMENT ---
    // ปรับจุดเข้าทำตามความเสี่ยง ถ้าแพ้ติดกัน ระบบจะสั่งให้ "นิ่ง" มากขึ้น
    let entryThreshold = 70;
    if(consecutiveL === 1) entryThreshold = 76;
    if(consecutiveL >= 2) entryThreshold = 85; // บังคับให้รอจังหวะ "มองขาด" จริงๆ

    // --- DEEP ARCHIVE SCAN (30 LAYERS) ---
    for(let d = 2; d <= 30; d++) {
        if(len < d) break;
        const pattern = archive.slice(-d).join("");
        let power = Math.pow(d, 5.8);

        for(let i = 0; i < len - d; i++) {
            if(archive.slice(i, i + d).join("") === pattern) {
                const res = archive[i + d];
                const ageFactor = (i / len); // ให้ความสำคัญกับประวัติที่ "สด" กว่า
                if(res === 'P') pWeight += (power * ageFactor);
                else if(res === 'B') bWeight += (power * ageFactor);
                matches++;
            }
        }
    }

    // --- MARKET SENTIMENT (Dragon & Ping-Pong Detection) ---
    const last4 = archive.slice(-4).join("");
    const isDragon = (last4 === "PPPP" || last4 === "BBBB");
    const isPingPong = (last4 === "PBPB" || last4 === "BPBP");

    if(isDragon) {
        const trendSide = archive[len-1];
        if(trendSide === 'P') pWeight *= 2.0; else bWeight *= 2.0;
    }

    const total = pWeight + bWeight;
    const probP = (pWeight / total) * 100;
    const probB = (bWeight / total) * 100;
    const risk = (100 - Math.max(probP, probB)) / 100;

    const targetEl = document.getElementById('target');
    const fill = document.getElementById('gauge-fill');
    const probEl = document.getElementById('prob-val');
    const modeEl = document.getElementById('strategy-mode');

    // --- DECISION LOGIC ---
    if((probP > entryThreshold || probB > entryThreshold) && risk < 0.35) {
        const side = probP > probB ? "PLAYER" : "BANKER";
        const val = Math.max(probP, probB);
        
        lastSignal = side === "PLAYER" ? "P" : "B";
        targetEl.innerText = side;
        targetEl.style.color = side === "PLAYER" ? "var(--p)" : "var(--b)";
        probEl.innerText = val.toFixed(1) + "%";
        fill.style.width = val + "%";
        fill.style.background = side === "PLAYER" ? "var(--p)" : "var(--b)";
        
        modeEl.innerText = consecutiveL > 0 ? "RECOVERY ENTRY" : (isDragon ? "TREND RIDING" : "GOLDEN ENTRY");
        modeEl.style.color = consecutiveL > 0 ? "var(--danger)" : "var(--neon)";
        document.getElementById('entry-point').innerText = val > 80 ? "HIGH CONVICTION" : "STRATEGIC PLAY";
        document.getElementById('entry-point').style.color = val > 80 ? "var(--gold)" : "#555";
    } else {
        lastSignal = null;
        targetEl.innerText = "WAIT";
        targetEl.style.color = "#1a1a1a";
        probEl.innerText = "---";
        fill.style.width = "0%";
        modeEl.innerText = "DANGER ZONE: OBSERVE";
        modeEl.style.color = "#444";
        document.getElementById('entry-point').innerText = "UNCERTAIN PHASE";
        document.getElementById('entry-point').style.color = "#555";
    }

    document.getElementById('risk-score').innerText = `RISK: ${risk.toFixed(2)}`;
    document.getElementById('match-pts').innerText = `${matches} PATTERNS FOUND`;
}

function renderUI() {
    const box = document.getElementById('h-view');
    box.innerHTML = archive.map(s => `<div class="unit" style="background:${s==='P'?'var(--p)':'var(--b)'}">${s}</div>`).join("");
    box.scrollLeft = box.scrollWidth;
    
    document.getElementById('w-stat').innerText = `W: ${wins}`;
    document.getElementById('l-stat').innerText = `L: ${loses}`;
    document.getElementById('p-stat').innerText = `NET: ${profitLog[profitLog.length-1]}`;
    
    if(!chart) {
        const ctx = document.getElementById('zenithChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [0], datasets: [{ data: [0], borderColor: '#00fff2', borderWidth: 4, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: 'rgba(0,255,242,0.02)' }] },
            options: { plugins:{legend:{display:false}}, scales:{x:{display:false}, y:{grid:{color:'#111'}, ticks:{color:'#333'}}} }
        });
    }
    chart.data.labels = profitLog.map((_, i) => i);
    chart.data.datasets[0].data = profitLog;
    chart.update('none');
}

function undo() {
    if(archive.length > 0) {
        archive.pop();
        if(profitLog.length > 1) profitLog.pop();
        if(consecutiveL > 0) consecutiveL--;
        renderUI();
        zenithEngine();
    }
}

window.onload = renderUI;
</script>
</body>
</html>
